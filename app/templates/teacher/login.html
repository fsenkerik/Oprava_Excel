{% extends 'base.html' %}
{% block title %}Přihlášení učitele{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-4"><i class="bi bi-person-lock me-2 text-primary"></i>Přihlášení učitele</h4>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Uživatelské jméno</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Heslo</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-1"></i>Přihlásit se
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
